<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aGiTrack - Documentation</title>
<meta name="description" content="aGiTrack documentation: the full manual and the interactive user-flow diagrams, rendered live from the project's own README and user-flow files.">
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="icon" type="image/png" href="images/favicon-64.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070b09;
  --panel:#0c120e;
  --panel-2:#101813;
  --line:#1d2a21;
  --phosphor:#3dffa0;
  --phosphor-dim:#1f7a52;
  --amber:#ffb454;
  --amber-dim:#8a5e2a;
  --fg:#cfe7d8;
  --fg-dim:#7e998a;
  --red:#ff6b6b;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --display:"VT323",var(--mono);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink);
  color:var(--fg);
  font-family:var(--mono);
  font-size:15px;
  line-height:1.65;
  overflow-x:hidden;
}
/* CRT atmosphere: scanlines + vignette, subtle */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:60;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.20) 0 1px,transparent 1px 3px);
  opacity:.30;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:61;
  background:radial-gradient(ellipse at 50% 12%,transparent 60%,rgba(0,0,0,.5) 100%);
}
::selection{background:var(--phosphor);color:var(--ink)}
a{color:var(--phosphor);text-decoration:none;border-bottom:1px solid var(--phosphor-dim)}
a:hover{color:var(--ink);background:var(--phosphor);border-bottom-color:var(--phosphor)}

/* ---- top nav ---- */
.nav{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding:12px 24px;background:rgba(7,11,9,.92);border-bottom:1px solid var(--line);
  backdrop-filter:blur(6px);
}
.nav .home{
  font-family:var(--display);font-size:30px;line-height:1;color:var(--phosphor);
  border-bottom:none;letter-spacing:1px;text-shadow:0 0 12px rgba(61,255,160,.4);
}
.nav .home:hover{background:none;color:var(--amber)}
.nav .home .a{color:var(--amber)}
.nav .spacer{flex:1}
.nav a.lnk{font-size:13px;color:var(--fg-dim);border-bottom:1px solid transparent}
.nav a.lnk:hover{color:var(--ink);background:var(--phosphor)}

/* ---- doc tabs ---- */
.tabs{display:flex;gap:8px}
.tab{
  padding:6px 14px;font-size:13px;font-weight:600;letter-spacing:.4px;cursor:pointer;
  color:var(--fg-dim);background:transparent;border:1px solid var(--line);border-bottom-width:3px;
  font-family:var(--mono);
}
.tab:hover{color:var(--fg);border-color:var(--phosphor-dim)}
.tab.on{color:var(--phosphor);border-color:var(--phosphor)}
.tab.flow.on{color:var(--amber);border-color:var(--amber)}

/* ---- layout: sidebar TOC + content ---- */
.shell{max-width:1180px;margin:0 auto;padding:28px 24px 80px;display:grid;grid-template-columns:250px minmax(0,1fr);gap:40px}
.toc{position:sticky;top:70px;align-self:start;max-height:calc(100vh - 96px);overflow-y:auto;font-size:13px;padding-right:6px}
.toc .toc-title{font-family:var(--display);font-size:22px;color:var(--amber);letter-spacing:.5px;margin-bottom:8px}
.toc a{display:block;padding:3px 0;color:var(--fg-dim);border-bottom:none;line-height:1.35}
.toc a:hover{background:none;color:var(--phosphor)}
.toc a.lv3{padding-left:14px;font-size:12.5px;color:#6b8579}
.toc a.active{color:var(--phosphor)}
.toc::-webkit-scrollbar{width:8px}
.toc::-webkit-scrollbar-thumb{background:var(--line)}

/* ---- rendered markdown ---- */
.doc{display:none;min-width:0}
.doc.on{display:block}
.md{min-width:0}
.md h1{font-family:var(--display);font-weight:400;font-size:46px;color:var(--phosphor);letter-spacing:1px;line-height:1;margin:6px 0 18px;text-shadow:0 0 18px rgba(61,255,160,.3)}
.md h2{font-family:var(--display);font-weight:400;font-size:32px;color:var(--phosphor);letter-spacing:.6px;margin:44px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.md h3{font-size:20px;font-weight:600;color:var(--amber);margin:30px 0 10px;letter-spacing:.3px}
.md h4{font-size:15.5px;font-weight:600;color:var(--fg);margin:22px 0 8px;text-transform:uppercase;letter-spacing:.6px}
.md p{max-width:74ch;color:var(--fg-dim);margin:0 0 14px}
.md p strong,.md li strong{color:var(--fg);font-weight:600}
.md a{word-break:break-word}
.md ul,.md ol{max-width:74ch;color:var(--fg-dim);margin:0 0 16px;padding-left:24px}
.md li{margin:5px 0}
.md li::marker{color:var(--phosphor-dim)}
.md code{font-family:var(--mono);background:var(--panel-2);color:var(--amber);padding:1px 5px;border:1px solid var(--line);border-radius:3px;font-size:.9em}
.md pre{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--phosphor-dim);border-radius:6px;padding:14px 16px;overflow-x:auto;margin:0 0 18px}
.md pre code{background:none;border:none;color:var(--phosphor);padding:0;font-size:13px;line-height:1.55}
.md blockquote{border-left:3px solid var(--amber-dim);background:rgba(255,180,84,.04);padding:8px 16px;margin:0 0 18px;color:var(--fg-dim)}
.md blockquote p{margin:6px 0}
.md table{border-collapse:collapse;margin:0 0 20px;font-size:13px;display:block;overflow-x:auto;max-width:100%}
.md th,.md td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top}
.md th{background:var(--panel-2);color:var(--phosphor);font-weight:600}
.md td{color:var(--fg-dim)}
.md hr{border:none;border-top:1px dashed var(--line);margin:28px 0}
.md img{max-width:100%;height:auto;border:1px solid var(--line);border-radius:6px;margin:8px 0}
.md h2 .anchor,.md h3 .anchor,.md h4 .anchor{
  opacity:0;margin-left:8px;font-size:.7em;color:var(--phosphor-dim);border-bottom:none;
}
.md h2:hover .anchor,.md h3:hover .anchor,.md h4:hover .anchor{opacity:1}
.md .anchor:hover{background:none;color:var(--phosphor)}

/* mermaid diagrams */
.mermaid{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin:0 0 22px;overflow-x:auto;text-align:center;cursor:zoom-in}
.mermaid svg{max-width:100%;height:auto}
/* Wrap long node labels: with the label width capped, mermaid measures the wrapped text and sizes
   the box to it — so long text breaks over several lines instead of one enormous single-line box.
   Uses overflow-wrap (NOT word-break: break-word, which collapses min-content to one char per line
   inside mermaid's flex label and stacks short labels vertically). Short labels stay on one line. */
.mermaid .nodeLabel,.mermaid .nodeLabel p{max-width:300px;white-space:normal!important;overflow-wrap:break-word}
.mermaid .nodeLabel{display:inline-block}
.mermaid .nodeLabel p{margin:0}
.mermaid::after{
  content:"⤢ click to zoom";position:absolute;top:8px;right:10px;font-size:11px;
  color:var(--amber);border:1px solid var(--amber-dim);padding:1px 7px;border-radius:3px;
  background:rgba(12,18,14,.85);opacity:.65;pointer-events:none;letter-spacing:.3px;
}
.mermaid:hover::after{opacity:1}

/* zoom lightbox */
.zoom{position:fixed;inset:0;z-index:80;background:rgba(4,7,5,.97);display:flex;flex-direction:column}
.zoom[hidden]{display:none}
.zoom-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel-2);font-size:13px;color:var(--fg-dim)}
.zoom-bar button{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--phosphor);background:transparent;border:1px solid var(--phosphor-dim);border-bottom-width:2px;padding:4px 12px;cursor:pointer}
.zoom-bar button:hover{background:var(--phosphor);color:var(--ink)}
.zoom-pct{min-width:54px;text-align:center;color:var(--amber);font-weight:600}
.zoom-hint{color:#5f7568;font-size:12px}
.zoom-close{margin-left:auto}
.zoom-stage{flex:1;overflow:auto;cursor:grab;padding:24px;touch-action:none}
.zoom-stage.drag{cursor:grabbing}
.zoom-stage svg{display:block;max-width:none!important;margin:0 auto}
@media (max-width:560px){ .zoom-hint{display:none} }

/* status / loading */
.status{color:var(--fg-dim);font-size:14px;padding:20px 0}
.status.err{color:var(--red)}
.status .btn{display:inline-block;margin-top:12px;padding:8px 14px;border:1px solid var(--amber);color:var(--amber);font-size:13px;font-weight:600;border-bottom-width:3px}
.status .btn:hover{background:var(--amber);color:var(--ink)}
.srcnote{font-size:12px;color:#5f7568;margin:0 0 22px;padding-bottom:14px;border-bottom:1px dashed var(--line)}

@media (max-width:820px){
  .shell{grid-template-columns:1fr;gap:20px}
  .toc{position:static;max-height:none;border:1px solid var(--line);padding:14px;border-radius:6px}
  .nav{gap:12px}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="home" href="index.html"><span class="a">a</span>GiTrack</a>
  <div class="tabs">
    <button class="tab on" id="tab-manual" data-doc="manual">Manual</button>
    <button class="tab flow" id="tab-userflow" data-doc="userflow">User Flow</button>
  </div>
  <span class="spacer"></span>
  <a class="lnk" href="index.html">← home</a>
  <a class="lnk" href="https://github.com/core-aix/agitrack">GitHub</a>
</nav>

<div class="shell">
  <aside class="toc" id="toc" aria-label="Table of contents"></aside>
  <div>
    <section class="doc on" id="doc-manual">
      <p class="srcnote">Rendered live from <a href="https://github.com/core-aix/agitrack/blob/main/README.md">README.md</a> — the project's canonical manual.</p>
      <div class="md" id="md-manual"><p class="status">Loading the manual…</p></div>
    </section>
    <section class="doc" id="doc-userflow">
      <p class="srcnote">Rendered live from <a href="https://github.com/core-aix/agitrack/blob/main/docs/user-flow.md">docs/user-flow.md</a> — the source of truth for aGiTrack's interactive flow.</p>
      <div class="md" id="md-userflow"><p class="status">Loading the user flow…</p></div>
    </section>
  </div>
</div>

<div class="zoom" id="zoom" hidden>
  <div class="zoom-bar">
    <button data-z="out" title="Zoom out">−</button>
    <span class="zoom-pct" id="zoomPct">100%</span>
    <button data-z="in" title="Zoom in">+</button>
    <button data-z="reset" title="Reset">reset</button>
    <span class="zoom-hint">scroll to zoom · drag to pan · Esc to close</span>
    <button data-z="close" class="zoom-close" title="Close">✕ close</button>
  </div>
  <div class="zoom-stage" id="zoomStage"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

mermaid.initialize({
  startOnLoad:false,
  theme:'base',
  themeVariables:{
    darkMode:true,
    background:'#0c120e',
    primaryColor:'#101813',
    primaryBorderColor:'#3dffa0',
    primaryTextColor:'#cfe7d8',
    secondaryColor:'#141f18',
    secondaryBorderColor:'#8a5e2a',
    tertiaryColor:'#0c120e',
    tertiaryBorderColor:'#1d2a21',
    lineColor:'#7e998a',
    textColor:'#cfe7d8',
    fontFamily:'IBM Plex Mono, ui-monospace, monospace',
    fontSize:'13px',
  },
  flowchart:{ htmlLabels:true, curve:'basis', useMaxWidth:true },
  securityLevel:'loose',
});

const REPO_BLOB = 'https://github.com/core-aix/agitrack/blob/main/';
const REPO_RAW  = 'https://raw.githubusercontent.com/core-aix/agitrack/main/';

// Each doc is fetched from a list of candidate URLs, in order, first success wins:
//  1. a same-origin path — reflects the CURRENT working tree when the repo is served locally
//     (serve the repo ROOT and open /docs/docs.html), so unmerged edits preview immediately;
//  2. the CORS-enabled raw GitHub `main` URL — the canonical published copy, and the fallback
//     that always works from file:// and on GitHub Pages (where Jekyll doesn't serve the raw .md).
// This is why an edit to README.md/user-flow.md shows here only after it lands on `main` — unless
// you preview it locally via the same-origin path above.
const SOURCES = {
  manual:   { urls: ['../README.md',    REPO_RAW + 'README.md'],         el: 'md-manual',   loaded:false },
  userflow: { urls: ['./user-flow.md',  REPO_RAW + 'docs/user-flow.md'], el: 'md-userflow', loaded:false },
};

async function fetchFirst(urls){
  let lastErr;
  for (const u of urls){
    try {
      const res = await fetch(u, { cache: 'no-cache' });
      if (!res.ok){ lastErr = new Error('HTTP ' + res.status); continue; }
      const text = await res.text();
      // A Jekyll-processed .md (on GitHub Pages) comes back as an HTML page, not markdown —
      // skip it so we fall through to the raw source rather than rendering a nested document.
      if (/^\s*<(!doctype|html)[\s>]/i.test(text)){ lastErr = new Error('not markdown'); continue; }
      return text;
    } catch (e){ lastErr = e; }
  }
  throw lastErr || new Error('no source available');
}

const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// GitHub-compatible heading slugs so the docs' own #anchor links keep working:
// lowercase, drop punctuation (keep word chars, spaces, hyphens), spaces -> hyphens
// (GitHub does NOT collapse runs of hyphens, so neither do we).
function makeSlugger(){
  const seen = Object.create(null);
  return raw => {
    let slug = raw.toLowerCase().trim()
      .replace(/<[^>]+>/g,'')
      .replace(/[^\w\- ]+/g,'')
      .replace(/ /g,'-');
    if (slug in seen){ seen[slug]++; slug = slug + '-' + seen[slug]; }
    else seen[slug] = 0;
    return slug;
  };
}

function buildRenderer(){
  const renderer = new marked.Renderer();
  const slug = makeSlugger();
  const defCode = renderer.code.bind(renderer);
  renderer.code = function(code, infostring, escaped){
    if ((infostring || '').trim().toLowerCase() === 'mermaid'){
      // keep the fence text verbatim (entities preserved) so mermaid gets exactly
      // what it does on GitHub — e.g. literal &lt;session&gt; in node labels.
      return '<div class="mermaid">' + escapeHtml(code) + '</div>';
    }
    return defCode(code, infostring, escaped);
  };
  renderer.heading = function(text, level, raw){
    if (level === 1) return `<h1>${text}</h1>`;
    const id = slug(raw);
    return `<h${level} id="${id}"><a class="anchor" href="#${id}" aria-hidden="true">#</a>${text}</h${level}>`;
  };
  return renderer;
}

function rewriteLinks(container){
  container.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('#') || /^(https?:|mailto:)/i.test(href)) return;
    if (/user-flow\.md/i.test(href)){ a.setAttribute('href','#'); a.dataset.doc = 'userflow'; return; }
    if (/(^|\/)README\.md/i.test(href)){ a.setAttribute('href','#'); a.dataset.doc = 'manual'; return; }
    const clean = href.replace(/^(\.\/|\.\.\/)+/,'');
    a.setAttribute('href', REPO_BLOB + clean);
    a.setAttribute('target','_blank');
    a.setAttribute('rel','noopener');
  });
  container.querySelectorAll('img[src]').forEach(img => {
    const src = img.getAttribute('src');
    if (!src || /^https?:/i.test(src)) return;
    img.setAttribute('src', REPO_RAW + src.replace(/^(\.\/|\.\.\/)+/,''));
  });
}

function buildToc(container){
  const toc = document.getElementById('toc');
  toc.innerHTML = '<div class="toc-title">Contents</div>';
  container.querySelectorAll('h2, h3').forEach(h => {
    if (!h.id) return;
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.replace(/^#/, '').trim();
    if (h.tagName === 'H3') a.className = 'lv3';
    toc.appendChild(a);
  });
}

// Render this doc's mermaid diagrams — but ONLY while its tab is visible. Mermaid measures
// text/label sizes with getBoundingClientRect, which returns 0 inside a display:none container,
// producing broken/empty diagrams. So a doc warmed in the background (hidden) has its markdown
// inserted but its diagrams left unrendered until its tab is shown (fixes "refresh once to see
// the diagrams"). Idempotent: guarded by mermaidDone + :not([data-processed]).
async function renderMermaidIfVisible(name){
  const src = SOURCES[name];
  if (!src.loaded || src.mermaidDone || name !== activeDoc) return;
  const target = document.getElementById(src.el);
  const nodes = target.querySelectorAll('.mermaid:not([data-processed])');
  if (!nodes.length){ src.mermaidDone = true; return; }
  try { await mermaid.run({ nodes }); src.mermaidDone = true; }
  catch (e){ console.error('mermaid', e); }
}

async function loadDoc(name){
  const src = SOURCES[name];
  if (src.loaded){ await renderMermaidIfVisible(name); return; }
  const target = document.getElementById(src.el);
  try {
    let text = await fetchFirst(src.urls);
    text = text.replace(/^\s*<!--[\s\S]*?-->\s*/, ''); // drop a leading HTML comment
    target.innerHTML = marked.parse(text, { renderer: buildRenderer(), gfm: true, breaks: false });
    rewriteLinks(target);
    src.loaded = true;
    await renderMermaidIfVisible(name); // no-op while hidden; renders when this tab is active
    if (name === activeDoc){ buildToc(target); jumpToHash(); }
  } catch (err){
    target.innerHTML = '<p class="status err">Couldn’t load this document ('
      + escapeHtml(String(err.message || err)) + ').</p>'
      + '<a class="btn" href="' + (name === 'manual'
          ? 'https://github.com/core-aix/agitrack#readme'
          : 'https://github.com/core-aix/agitrack/blob/main/docs/user-flow.md')
      + '">Read it on GitHub instead</a>';
  }
}

let activeDoc = 'manual';

function jumpToHash(){
  if (location.hash.length > 1){
    const el = document.getElementById(decodeURIComponent(location.hash.slice(1)));
    if (el) el.scrollIntoView();
  }
}

async function activate(name, push){
  if (!SOURCES[name]) name = 'manual';
  activeDoc = name;
  for (const key of Object.keys(SOURCES)){
    document.getElementById('doc-' + key).classList.toggle('on', key === name);
    document.getElementById('tab-' + key).classList.toggle('on', key === name);
  }
  if (push){
    const u = new URL(location.href);
    u.searchParams.set('tab', name);
    u.hash = '';
    history.pushState({ doc:name }, '', u);
  }
  await loadDoc(name);
  await renderMermaidIfVisible(name); // render now if it was warmed while hidden
  const target = document.getElementById(SOURCES[name].el);
  if (SOURCES[name].loaded){ buildToc(target); jumpToHash(); }
}

// tab buttons + cross-document links
document.addEventListener('click', e => {
  const t = e.target.closest('[data-doc]');
  if (!t) return;
  if (t.tagName === 'A' && t.getAttribute('href') && t.getAttribute('href') !== '#') return;
  e.preventDefault();
  activate(t.dataset.doc, true);
});
window.addEventListener('popstate', () => {
  const tab = new URL(location.href).searchParams.get('tab') || 'manual';
  activate(tab, false);
});

// ---- zoomable diagrams: click a diagram to open a pan/zoom lightbox ----
const zoom = document.getElementById('zoom');
const stage = document.getElementById('zoomStage');
const pctEl = document.getElementById('zoomPct');
let zSvg = null, zW = 0, zH = 0, zScale = 1;

function applyZoom(){
  if (!zSvg) return;
  zSvg.style.width = (zW * zScale) + 'px';
  zSvg.style.height = (zH * zScale) + 'px';
  pctEl.textContent = Math.round(zScale * 100) + '%';
}
function openZoom(srcSvg){
  const vb = (srcSvg.getAttribute('viewBox') || '').split(/[\s,]+/).map(Number);
  const rect = srcSvg.getBoundingClientRect();
  zW = (vb.length === 4 && vb[2]) ? vb[2] : (rect.width || 800);
  zH = (vb.length === 4 && vb[3]) ? vb[3] : (rect.height || 600);
  const clone = srcSvg.cloneNode(true);
  clone.removeAttribute('width'); clone.removeAttribute('height'); clone.style.maxWidth = 'none';
  stage.innerHTML = ''; stage.appendChild(clone); zSvg = clone;
  zScale = 1; // open at the diagram's natural (readable) size; large ones become pannable
  applyZoom();
  zoom.hidden = false;
  // center the diagram in the viewport
  stage.scrollLeft = Math.max(0, (zSvg.offsetWidth - stage.clientWidth) / 2);
  stage.scrollTop = 0;
}
function closeZoom(){ zoom.hidden = true; stage.innerHTML = ''; zSvg = null; }
function zoomBy(factor, px, py){
  if (!zSvg) return;
  const old = zScale;
  zScale = Math.min(14, Math.max(0.1, zScale * factor));
  if (zScale === old) return;
  const ratio = zScale / old;
  // keep the point under the cursor (or the viewport center) fixed while scaling
  const cx = (px == null ? stage.clientWidth / 2 : px);
  const cy = (py == null ? stage.clientHeight / 2 : py);
  const beforeX = stage.scrollLeft + cx, beforeY = stage.scrollTop + cy;
  applyZoom();
  stage.scrollLeft = beforeX * ratio - cx;
  stage.scrollTop = beforeY * ratio - cy;
}

// open on click of any rendered diagram
document.addEventListener('click', e => {
  const m = e.target.closest('.mermaid');
  if (!m || zoom.contains(m)) return;
  const svg = m.querySelector('svg');
  if (svg) openZoom(svg);
});
// toolbar
zoom.querySelector('.zoom-bar').addEventListener('click', e => {
  const b = e.target.closest('[data-z]');
  if (!b) return;
  const z = b.dataset.z;
  if (z === 'in') zoomBy(1.25);
  else if (z === 'out') zoomBy(1/1.25);
  else if (z === 'reset'){ zoomBy(1/zScale); stage.scrollLeft = Math.max(0,(zSvg.offsetWidth-stage.clientWidth)/2); stage.scrollTop = 0; }
  else if (z === 'close') closeZoom();
});
// wheel to zoom (anchored at cursor)
stage.addEventListener('wheel', e => {
  if (zoom.hidden) return;
  e.preventDefault();
  const r = stage.getBoundingClientRect();
  zoomBy(e.deltaY < 0 ? 1.15 : 1/1.15, e.clientX - r.left, e.clientY - r.top);
}, { passive:false });
// drag to pan
let dragging = false, lastX = 0, lastY = 0;
stage.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; stage.classList.add('drag'); stage.setPointerCapture(e.pointerId); });
stage.addEventListener('pointermove', e => { if (!dragging) return; stage.scrollLeft -= (e.clientX - lastX); stage.scrollTop -= (e.clientY - lastY); lastX = e.clientX; lastY = e.clientY; });
stage.addEventListener('pointerup', e => { dragging = false; stage.classList.remove('drag'); });
stage.addEventListener('pointercancel', () => { dragging = false; stage.classList.remove('drag'); });
document.addEventListener('keydown', e => {
  if (zoom.hidden) return;
  if (e.key === 'Escape') closeZoom();
  else if (e.key === '+' || e.key === '=') zoomBy(1.25);
  else if (e.key === '-') zoomBy(1/1.25);
});

// initial: honor ?tab=, then eagerly warm the other doc in the background
const startTab = new URL(location.href).searchParams.get('tab') || 'manual';
activate(startTab, false).then(() => {
  const other = startTab === 'manual' ? 'userflow' : 'manual';
  loadDoc(other);
});
</script>
</body>
</html>
