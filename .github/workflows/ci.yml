name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # The POSIX OS axis that matters is macOS (BSD pty/termios) vs Linux (glibc). Run both
    # to catch platform-specific pty/ioctl/terminal differences. Native Windows (ConPTY +
    # Win32 console, #118) is covered by the dedicated `windows` job below — much of this
    # suite is POSIX-terminal-specific, so Windows runs a curated, platform-relevant subset.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The suite shells out to `git commit` in temp repos; the runner has no
      # default git identity, so configure one or those tests fail with
      # "Author identity unknown".
      - name: Configure git identity
        run: |
          git config --global user.email "ci@agitrack.invalid"
          git config --global user.name "aGiTrack CI"

      # Official action installs uv cross-platform (Linux, macOS, Windows).
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      # Lint, format and type checks are platform-independent — run them once (on
      # Linux) rather than on every OS in the matrix.
      - name: Lint (ruff check)
        if: matrix.os == 'ubuntu-latest'
        run: uv run ruff check agitrack/ tests/

      - name: Format (ruff format --check)
        if: matrix.os == 'ubuntu-latest'
        run: uv run ruff format --check agitrack/ tests/

      - name: Types (mypy, new errors only)
        if: matrix.os == 'ubuntu-latest'
        # mypy runs against a committed baseline of pre-existing type debt
        # (mypy-baseline.txt). The build fails only on NEW type errors; the
        # baseline is burned down separately (#42). Regenerate with:
        #   uv run mypy | uv run mypy-baseline sync
        run: uv run mypy | uv run mypy-baseline filter

      - name: Tests + coverage
        run: |
          uv run coverage run -m pytest -q
          uv run coverage report

  # Native-Windows validation (#118): the package imports and runs natively on Windows
  # (ConPTY via pywinpty, Win32 console, msvcrt locking). Most of the suite is
  # POSIX-terminal-specific, so this runs a curated, platform-relevant subset plus an
  # import smoke and a real ConPTY spawn/read check (test_windows_conpty, skipped off
  # Windows). git ships on the windows-latest runner.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "ci@agitrack.invalid"
          git config --global user.name "aGiTrack CI"

      - name: Install uv
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding ascii

      - name: Install dependencies
        run: uv sync --group dev

      - name: Import smoke (native Windows)
        run: uv run python -c "import agitrack, agitrack.cli, agitrack.proxy, agitrack.proxy.platform.nt, agitrack.git.lock; print(agitrack.__version__)"

      - name: Windows-relevant tests + ConPTY
        run: uv run python -m pytest tests/test_proc.py tests/test_dashboard_daemon.py tests/test_shutdown_request.py tests/test_windows_conpty.py -q

  # The Windows MSI is a first-class, standalone install method — a user can download it
  # from the GitHub release and install aGiTrack without pip/pipx/Python (the VSCode
  # extension also falls back to it when no Python tooling is present). The release
  # workflows only build the MSI at release time, so it could silently rot between
  # releases; this job builds it on every PR AND proves it installs by itself: a silent
  # perMachine `msiexec` install (the runner has an admin token), assert the installed
  # agitrack.exe reports the real version, then a clean silent uninstall. If the WiX
  # source, the PyInstaller spec, or a new runtime import breaks the bundle, this fails
  # here rather than at release time.
  build-msi:
    name: Build + install Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install runtime + build deps
        run: uv sync --group build

      - name: Read version from pyproject
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "MSI_NAME=agitrack-$ver-windows-x64.msi" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: uv run pyinstaller installer/agitrack.spec -y

      - name: Smoke-test bundled EXE
        shell: pwsh
        run: dist\agitrack\agitrack.exe --version

      - name: Install WiX v5
        # WiX v5 is required for the <Files> harvest element in agitrack.wxs (v4 lacks it).
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WiX UI extension
        # Pin the UI extension to the SAME version as the wix tool. Unpinned, `wix
        # extension add` pulls the latest (a newer major), which the toolset can't load —
        # `wix build` then fails with WIX0144 "extension could not be found".
        run: wix extension add --global WixToolset.UI.wixext/5.0.2

      - name: Build MSI
        # -arch x64: the PyInstaller bundle is 64-bit, so the MSI must be too. Without it
        # WiX builds an x86 package whose ProgramFiles64Folder doesn't resolve to
        # C:\Program Files, so the files install to the wrong place.
        run: |
          wix build `
            installer\agitrack.wxs `
            -arch x64 `
            -d Version=${{ steps.version.outputs.VERSION }} `
            -d SourceDir=${{ github.workspace }}\dist\agitrack `
            -ext WixToolset.UI.wixext `
            -o dist\${{ steps.version.outputs.MSI_NAME }}

      # Publish the built MSI as a downloadable workflow artifact so it can be tested by hand
      # off any PR/branch build — not just at release time. (Uploaded before the install
      # smoke-test below so the artifact is captured even if that step later fails.)
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.MSI_NAME }}
          path: dist/${{ steps.version.outputs.MSI_NAME }}
          if-no-files-found: error
          retention-days: 14

      # Prove the MSI installs as a standalone product (no pip/Python on the target).
      # /qn is a silent perMachine install; the runner's admin token bypasses UAC.
      - name: Install the MSI silently
        shell: pwsh
        run: |
          $msi = "dist\${{ steps.version.outputs.MSI_NAME }}"
          $proc = Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /qn /norestart" -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "msiexec install failed: exit $($proc.ExitCode)" }

      - name: Run the installed agitrack.exe
        shell: pwsh
        run: |
          $exe = Join-Path $env:ProgramFiles "aGiTrack\agitrack.exe"
          if (-not (Test-Path $exe)) { throw "installed exe not found at $exe" }
          # The frozen build must report the real version, not the 0.0.0 fallback — i.e.
          # copy_metadata("agitrack") in the spec actually bundled the dist-info.
          $reported = (& $exe --version).Trim()
          $expected = "${{ steps.version.outputs.VERSION }}"
          if ($reported -ne $expected) { throw "installed exe reported '$reported', expected '$expected'" }

      - name: Uninstall the MSI silently
        shell: pwsh
        run: |
          $msi = "dist\${{ steps.version.outputs.MSI_NAME }}"
          $proc = Start-Process msiexec.exe -ArgumentList "/x `"$msi`" /qn /norestart" -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "msiexec uninstall failed: exit $($proc.ExitCode)" }

  # The VSCode extension is TypeScript, built and tested with Node — independent of the
  # Python suite above. Its unit tests (node:test) are platform-independent (the
  # native-Windows guard is exercised by passing platform strings, not the real OS), so a
  # single Linux job is enough. `npm test` also runs `tsc`, so this fails on a compile error.
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Compile + unit tests
        run: npm test
