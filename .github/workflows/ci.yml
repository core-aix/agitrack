name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # aGiTrack is a POSIX TUI (it imports pty/termios/fcntl directly), so the OS axis
    # that actually matters is macOS (BSD pty/termios) vs Linux (glibc). Run both to
    # catch platform-specific pty/ioctl/terminal differences. Native Windows is not a
    # target — the package can't even import there; Windows is supported via WSL, which
    # is Linux and so is already covered by the ubuntu job.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The suite shells out to `git commit` in temp repos; the runner has no
      # default git identity, so configure one or those tests fail with
      # "Author identity unknown".
      - name: Configure git identity
        run: |
          git config --global user.email "ci@agitrack.invalid"
          git config --global user.name "aGiTrack CI"

      # Install uv via its official script rather than a third-party action,
      # so the workflow runs even under an "allow GitHub-owned actions only"
      # policy. uv manages the Python toolchain itself.
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --group dev

      # Lint, format and type checks are platform-independent — run them once (on
      # Linux) rather than on every OS in the matrix.
      - name: Lint (ruff check)
        if: matrix.os == 'ubuntu-latest'
        run: uv run ruff check agitrack/ tests/

      - name: Format (ruff format --check)
        if: matrix.os == 'ubuntu-latest'
        run: uv run ruff format --check agitrack/ tests/

      - name: Types (mypy, new errors only)
        if: matrix.os == 'ubuntu-latest'
        # mypy runs against a committed baseline of pre-existing type debt
        # (mypy-baseline.txt). The build fails only on NEW type errors; the
        # baseline is burned down separately (#42). Regenerate with:
        #   uv run mypy | uv run mypy-baseline sync
        run: uv run mypy | uv run mypy-baseline filter

      - name: Tests + coverage
        run: |
          uv run coverage run -m pytest -q
          uv run coverage report

  # The VSCode extension is TypeScript, built and tested with Node — independent of the
  # Python suite above. Its unit tests (node:test) are platform-independent (the
  # native-Windows guard is exercised by passing platform strings, not the real OS), so a
  # single Linux job is enough. `npm test` also runs `tsc`, so this fails on a compile error.
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Compile + unit tests
        run: npm test
