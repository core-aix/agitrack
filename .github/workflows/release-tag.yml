name: Release (tag)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    # Exposed so the Windows MSI job below can name and attach its artefact to the
    # release this job creates.
    outputs:
      version: ${{ steps.version.outputs.version }}

    env:
      # Set this repository secret to a Marketplace Personal Access Token to have the
      # VSCode extension published automatically on each release. When it's absent the
      # publish step is skipped (the rest of the release still runs).
      VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python3 <<PY
          import re, pathlib

          version = "$VERSION"

          # pyproject.toml is the only version source; agitrack.__version__ derives
          # from the installed distribution metadata at runtime.
          pp = pathlib.Path("pyproject.toml")
          pp.write_text(re.sub(
              r'^version = "[^"]+"',
              f'version = "{version}"',
              pp.read_text(),
              count=1,
              flags=re.M
          ))
          PY
          # Keep the VSCode extension version in lockstep with the CLI.
          python3 scripts/sync_vscode_version.py

      - name: Sync version files to main via PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/sync-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add pyproject.toml editors/vscode/package.json editors/vscode/package-lock.json
          # The version file may already match the tag (e.g. the tag was placed
          # on an already-bumped commit). Only open a PR when there's a change —
          # main cannot be pushed to directly, so the sync goes through a PR.
          if git diff --cached --quiet; then
            echo "Version files already at v${VERSION}; nothing to sync."
          else
            git commit -m "Release v${VERSION}"
            git push origin "$BRANCH"
            gh pr create --base main --head "$BRANCH" \
              --title "Release v${VERSION}" \
              --body "Sync version files to tag v${VERSION}."
            for attempt in 1 2 3 4 5 6; do
              if gh pr merge "$BRANCH" --squash --delete-branch; then
                merged=1
                break
              fi
              echo "merge attempt ${attempt} failed; retrying in 5s..."
              sleep 5
            done
            if [ "${merged:-0}" != 1 ]; then
              echo "::error::could not merge the version-sync PR for v${VERSION}"
              exit 1
            fi
          fi
          git fetch origin main
          git switch main
          git reset --hard origin/main

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

      # Summarize the key changes since the previous release with the OpenAI API
      # (shared composite action). The change range ends at this tag. AI-only:
      # this step FAILS the release with a descriptive error if OpenAI is
      # unavailable. Requires the OPENAI_API_KEY secret.
      - name: Generate AI release notes
        id: notes
        uses: ./.github/actions/ai-release-notes
        with:
          version: ${{ steps.version.outputs.version }}
          ref: ${{ github.ref_name }}
          repository: ${{ github.repository }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_FILE: ${{ steps.notes.outputs.notes-file }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file "${NOTES_FILE}" \
            dist/*

      # Publish the VSCode extension to the Marketplace at the matching version, so a
      # CLI release and its extension move together. Skipped when VSCE_TOKEN is unset.
      - name: Set up Node
        if: ${{ env.VSCE_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish VSCode extension
        if: ${{ env.VSCE_TOKEN != '' }}
        working-directory: editors/vscode
        run: |
          npm install --no-audit --no-fund
          npm run compile
          npx --yes @vscode/vsce publish --no-dependencies -p "$VSCE_TOKEN"

  # Build the standalone Windows MSI and attach it to the release the job above created.
  # Lives in the same workflow run as the release for the same reason as in
  # release-patch.yml — a tag-triggered workflow can't fire here either, since this very
  # workflow already owns the tag event. Built from the tagged commit so the MSI matches
  # exactly what was released.
  build-msi:
    name: Build + attach Windows MSI
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install runtime + build deps
        run: uv sync --group build

      - name: Resolve MSI name
        id: msi
        shell: pwsh
        run: |
          $ver = "${{ needs.release.outputs.version }}"
          echo "MSI_NAME=agitrack-$ver-windows-x64.msi" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: uv run pyinstaller installer/agitrack.spec -y

      - name: Smoke-test bundled EXE
        run: dist\agitrack\agitrack.exe --version

      - name: Install WiX v4
        run: dotnet tool install --global wix --version 4.0.6

      - name: Add WiX UI extension
        # Pin the UI extension to the SAME version as the wix tool. Unpinned, `wix
        # extension add` pulls the latest (a newer major), which the 4.0.x toolset
        # can't load — `wix build` then fails with WIX0144 "extension could not be found".
        run: wix extension add --global WixToolset.UI.wixext/4.0.6

      - name: Build MSI
        run: |
          wix build `
            installer\agitrack.wxs `
            -d Version=${{ needs.release.outputs.version }} `
            -d SourceDir=dist\agitrack `
            -ext WixToolset.UI.wixext `
            -o dist\${{ steps.msi.outputs.MSI_NAME }}

      - name: Attach MSI to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ needs.release.outputs.version }}" "dist/${{ steps.msi.outputs.MSI_NAME }}" --clobber
