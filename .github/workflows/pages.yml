# Builds and deploys the public site (agitrack.core-aix.org): the docs/ landing pages plus
# a freshly generated static demo dashboard (`agitrack -d export`) under /dashboard/, so the
# demo is the repository's real, current history on every push to main.
#
# Requires the repository's Pages settings to use the "GitHub Actions" source (not the
# legacy main:/docs branch build); actions/configure-pages switches it on first run.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The demo dashboard is computed from the FULL commit history.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install aGiTrack (this checkout)
        run: pip install .
      - name: Build the static demo dashboard
        run: |
          # The learn page's demo profile: a curated fixture (real coach output for this
          # repo, checked in) seeded into the store the export reads.
          mkdir -p .agitrack
          cp docs/demo/learning.json .agitrack/learning.json
          agitrack -d export --export-dir "$RUNNER_TEMP/site/dashboard"
      - name: Assemble the site (docs + demo dashboard)
        run: cp -R docs/. "$RUNNER_TEMP/site/"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site
      - id: deployment
        uses: actions/deploy-pages@v4
