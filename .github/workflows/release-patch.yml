name: Release (patch)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Don't react to the bump commit itself. (Merges made with GITHUB_TOKEN do
    # not trigger workflows, so this is also belt-and-suspenders against a loop.)
    if: github.event.head_commit.author.name != 'github-actions[bot]'

    # Exposed so the Windows MSI job below can name and attach its artefact to the
    # release this job creates.
    outputs:
      version: ${{ steps.bump.outputs.version }}

    env:
      # Set this repository secret to a Marketplace Personal Access Token to have the
      # VSCode extension published automatically on each release. When it's absent the
      # publish step is skipped (the rest of the release still runs).
      VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Bump version
        id: bump
        # The bump level is taken from the merge commit / squash-PR title: include
        # "[minor]" to bump the minor and reset patch to 0, or "[major]" to bump the
        # major and reset minor+patch to 0. With neither marker it's a patch bump (the
        # default). The message is passed via env (never interpolated into the shell) so
        # an arbitrary PR title can't inject commands.
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os, re, pathlib

          message = os.environ.get("HEAD_COMMIT_MESSAGE", "")
          lowered = message.lower()
          if "[major]" in lowered:
              level = "major"
          elif "[minor]" in lowered:
              level = "minor"
          else:
              level = "patch"

          pp = pathlib.Path("pyproject.toml")
          m = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"', pp.read_text(), re.M)
          if not m:
              raise SystemExit("could not find version in pyproject.toml")
          major, minor, patch = (int(g) for g in m.groups())
          if level == "major":
              major, minor, patch = major + 1, 0, 0
          elif level == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new_version = f"{major}.{minor}.{patch}"

          pp.write_text(re.sub(
              r'^version = "[^"]+"', f'version = "{new_version}"',
              pp.read_text(), count=1, flags=re.M,
          ))
          # pyproject.toml is the only version source; agitrack.__version__ derives
          # from the installed distribution metadata at runtime. The level line goes to
          # stderr so it shows in the log without landing in $GITHUB_OUTPUT (stdout).
          import sys
          print(f"{level} release: bumping to v{new_version}", file=sys.stderr)
          print(f"version={new_version}")
          PY
          # Keep the VSCode extension version in lockstep with the CLI.
          python3 scripts/sync_vscode_version.py

      - name: Open and merge the version-bump PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add pyproject.toml editors/vscode/package.json editors/vscode/package-lock.json
          git commit -m "Release v${VERSION}"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "Automated patch version bump to v${VERSION}."
          # main requires changes via a PR (0 approvals, no required checks), so
          # the bump PR can be merged straight away. Retry while GitHub is still
          # computing the PR's mergeable state.
          for attempt in 1 2 3 4 5 6; do
            if gh pr merge "$BRANCH" --squash --delete-branch; then
              merged=1
              break
            fi
            echo "merge attempt ${attempt} failed; retrying in 5s..."
            sleep 5
          done
          if [ "${merged:-0}" != 1 ]; then
            echo "::error::could not merge the release PR for v${VERSION}"
            exit 1
          fi
          # Build/publish from the merged state.
          git fetch origin main
          git switch main
          git reset --hard origin/main

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

      # Summarize the key changes since the previous release with the OpenAI API
      # (shared composite action). AI-only: this step FAILS the release with a
      # descriptive error if OpenAI is unavailable, rather than shipping inferior
      # notes. Requires the OPENAI_API_KEY secret.
      - name: Generate AI release notes
        id: notes
        uses: ./.github/actions/ai-release-notes
        with:
          version: ${{ steps.bump.outputs.version }}
          ref: HEAD
          repository: ${{ github.repository }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_FILE: ${{ steps.notes.outputs.notes-file }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --target main \
            --notes-file "${NOTES_FILE}" \
            dist/*

      # Publish the VSCode extension to the Marketplace at the matching version, so a
      # CLI release and its extension move together. Skipped when VSCE_TOKEN is unset.
      - name: Set up Node
        if: ${{ env.VSCE_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish VSCode extension
        if: ${{ env.VSCE_TOKEN != '' }}
        working-directory: editors/vscode
        run: |
          npm install --no-audit --no-fund
          npm run compile
          npx --yes @vscode/vsce publish --no-dependencies -p "$VSCE_TOKEN"

  # Build the standalone Windows MSI and attach it to the release the job above just
  # created. This MUST live in the same workflow run as the release: the release is created
  # with GITHUB_TOKEN, and a tag/release made with GITHUB_TOKEN does NOT trigger other
  # workflows — so a separate tag-triggered MSI workflow would never fire (it never did).
  # `needs: release` makes this run after the release exists and after the version bump has
  # merged to main, so checking out main yields the bumped source and `gh release upload`
  # has a release to attach to.
  build-msi:
    name: Build + attach Windows MSI
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install runtime + build deps
        run: uv sync --group build

      - name: Resolve MSI name
        id: msi
        shell: pwsh
        run: |
          $ver = "${{ needs.release.outputs.version }}"
          echo "MSI_NAME=agitrack-$ver-windows-x64.msi" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: uv run pyinstaller installer/agitrack.spec -y

      - name: Smoke-test bundled EXE
        run: dist\agitrack\agitrack.exe --version

      - name: Install WiX v4
        run: dotnet tool install --global wix --version 4.*

      - name: Add WiX UI extension
        run: wix extension add --global WixToolset.UI.wixext

      - name: Harvest PyInstaller output
        run: |
          wix harvest dir dist\agitrack `
            --output installer\agitrack-files.wxs `
            --component-group AgitrackFiles `
            --directory-ref INSTALLFOLDER `
            --var var.SourceDir

      - name: Build MSI
        run: |
          wix build `
            installer\agitrack.wxs `
            installer\agitrack-files.wxs `
            -d Version=${{ needs.release.outputs.version }} `
            -d SourceDir=dist\agitrack `
            -ext WixToolset.UI.wixext `
            -o dist\${{ steps.msi.outputs.MSI_NAME }}

      - name: Attach MSI to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ needs.release.outputs.version }}" "dist/${{ steps.msi.outputs.MSI_NAME }}" --clobber
