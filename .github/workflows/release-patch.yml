name: Release (patch)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.head_commit.author.name != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Bump patch version
        id: bump
        run: |
          python3 <<'PY'
          import re, pathlib

          pp = pathlib.Path("pyproject.toml")
          m = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"', pp.read_text(), re.M)
          if not m:
              raise SystemExit("could not find version in pyproject.toml")
          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
          patch += 1
          new_version = f"{major}.{minor}.{patch}"

          pp.write_text(re.sub(
              r'^version = "[^"]+"',
              f'version = "{new_version}"',
              pp.read_text(),
              count=1,
              flags=re.M
          ))

          ip = pathlib.Path("agit/__init__.py")
          ip.write_text(re.sub(
              r'^__version__ = "[^"]+"',
              f'__version__ = "{new_version}"',
              ip.read_text(),
              count=1,
              flags=re.M
          ))

          print(f"version={new_version}")
          PY

      - name: Commit and push
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'version = \"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml agit/__init__.py
          git commit -m "Release v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin main --tags

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'version = \"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            dist/*
