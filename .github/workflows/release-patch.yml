name: Release (patch)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  # Lets the release-notes step call GitHub Models (GitHub's built-in AI
  # inference) with the default GITHUB_TOKEN — no extra API key needed.
  models: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Don't react to the bump commit itself. (Merges made with GITHUB_TOKEN do
    # not trigger workflows, so this is also belt-and-suspenders against a loop.)
    if: github.event.head_commit.author.name != 'github-actions[bot]'

    env:
      # Set this repository secret to a Marketplace Personal Access Token to have the
      # VSCode extension published automatically on each release. When it's absent the
      # publish step is skipped (the rest of the release still runs).
      VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Bump version
        id: bump
        # The bump level is taken from the merge commit / squash-PR title: include
        # "[minor]" to bump the minor and reset patch to 0, or "[major]" to bump the
        # major and reset minor+patch to 0. With neither marker it's a patch bump (the
        # default). The message is passed via env (never interpolated into the shell) so
        # an arbitrary PR title can't inject commands.
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os, re, pathlib

          message = os.environ.get("HEAD_COMMIT_MESSAGE", "")
          lowered = message.lower()
          if "[major]" in lowered:
              level = "major"
          elif "[minor]" in lowered:
              level = "minor"
          else:
              level = "patch"

          pp = pathlib.Path("pyproject.toml")
          m = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"', pp.read_text(), re.M)
          if not m:
              raise SystemExit("could not find version in pyproject.toml")
          major, minor, patch = (int(g) for g in m.groups())
          if level == "major":
              major, minor, patch = major + 1, 0, 0
          elif level == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new_version = f"{major}.{minor}.{patch}"

          pp.write_text(re.sub(
              r'^version = "[^"]+"', f'version = "{new_version}"',
              pp.read_text(), count=1, flags=re.M,
          ))
          # pyproject.toml is the only version source; agitrack.__version__ derives
          # from the installed distribution metadata at runtime. The level line goes to
          # stderr so it shows in the log without landing in $GITHUB_OUTPUT (stdout).
          import sys
          print(f"{level} release: bumping to v{new_version}", file=sys.stderr)
          print(f"version={new_version}")
          PY
          # Keep the VSCode extension version in lockstep with the CLI.
          python3 scripts/sync_vscode_version.py

      - name: Open and merge the version-bump PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add pyproject.toml editors/vscode/package.json editors/vscode/package-lock.json
          git commit -m "Release v${VERSION}"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "Automated patch version bump to v${VERSION}."
          # main requires changes via a PR (0 approvals, no required checks), so
          # the bump PR can be merged straight away. Retry while GitHub is still
          # computing the PR's mergeable state.
          for attempt in 1 2 3 4 5 6; do
            if gh pr merge "$BRANCH" --squash --delete-branch; then
              merged=1
              break
            fi
            echo "merge attempt ${attempt} failed; retrying in 5s..."
            sleep 5
          done
          if [ "${merged:-0}" != 1 ]; then
            echo "::error::could not merge the release PR for v${VERSION}"
            exit 1
          fi
          # Build/publish from the merged state.
          git fetch origin main
          git switch main
          git reset --hard origin/main

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

      # Collect the commit subjects of the PR whose merge triggered this run.
      # Using the commits/<sha>/pulls API means this works regardless of how the
      # PR was created or merged (squash, merge commit, or rebase) and does not
      # depend on aGiTrack's commit format.
      - name: Collect the merged PR's commits
        id: prcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.event.head_commit.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NUM=$(gh api "repos/${REPO}/commits/${MERGE_SHA}/pulls" \
                  --jq '.[0].number' 2>/dev/null || true)
          if [ -z "${NUM:-}" ] || [ "${NUM}" = "null" ]; then
            echo "No PR is associated with ${MERGE_SHA}; will fall back to generated notes."
            echo "number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=${NUM}" >> "$GITHUB_OUTPUT"
          # One bullet per commit (first line of each message), oldest to newest.
          gh api --paginate "repos/${REPO}/pulls/${NUM}/commits" \
            --jq '.[].commit.message | split("\n")[0] | "- " + .' > pr_commits.txt
          echo "Commits in PR #${NUM}:"
          cat pr_commits.txt

      # Summarize those commits into a changelog with GitHub Models (GitHub's
      # built-in AI). continue-on-error keeps a release shipping even if the
      # inference call fails — the next step falls back to generated notes.
      - name: Summarize changes with GitHub Models
        id: ai
        if: steps.prcommits.outputs.number != ''
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-completion-tokens: 800
          system-prompt: >
            You write concise GitHub release notes from a list of commit
            subjects in a single merged pull request. Output GitHub-flavored
            Markdown only, with no preamble or headings: an optional one-sentence
            summary line, then a bullet list of the meaningful, user-facing
            changes. Merge duplicates and drop pure noise (merge commits, version
            bumps, formatting-only or CI-only changes). Keep it tight.
          prompt-file: pr_commits.txt

      - name: Assemble release notes
        id: notes
        env:
          AI_NOTES: ${{ steps.ai.outputs.response }}
          VERSION: ${{ steps.bump.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -n "${AI_NOTES//[[:space:]]/}" ]; then
            printf '%s\n' "$AI_NOTES" > release_notes.md
            PREV=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -n "$PREV" ]; then
              {
                echo
                echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV}...v${VERSION}"
              } >> release_notes.md
            fi
            echo "have_notes=1" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          if [ "${{ steps.notes.outputs.have_notes }}" = "1" ]; then
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --target main \
              --notes-file release_notes.md \
              dist/*
          else
            # No PR found or the AI step failed: keep the previous behavior.
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --target main \
              --generate-notes \
              dist/*
          fi

      # Publish the VSCode extension to the Marketplace at the matching version, so a
      # CLI release and its extension move together. Skipped when VSCE_TOKEN is unset.
      - name: Set up Node
        if: ${{ env.VSCE_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish VSCode extension
        if: ${{ env.VSCE_TOKEN != '' }}
        working-directory: editors/vscode
        run: |
          npm install --no-audit --no-fund
          npm run compile
          npx --yes @vscode/vsce publish --no-dependencies -p "$VSCE_TOKEN"
