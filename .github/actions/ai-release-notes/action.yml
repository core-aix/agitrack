name: AI release notes
description: >
  Summarize the key changes since the previous release into Markdown release
  notes using the OpenAI API. The notes are AI-only: if the OpenAI API is
  unavailable (missing key, network error, HTTP error, or empty completion) the
  action FAILS with a descriptive error so the release does not proceed with
  inferior notes.

inputs:
  version:
    description: The version being released, without a leading "v" (e.g. 1.2.3).
    required: true
  ref:
    description: >
      Git ref marking the end of the change range (the commit/tag being
      released). The range is "<previous tag>..<ref>".
    required: false
    default: HEAD
  openai-api-key:
    description: OpenAI API key. When empty, the AI summary is skipped.
    required: false
    default: ""
  model:
    description: OpenAI model to use.
    required: false
    default: gpt-4o-mini
  repository:
    description: owner/repo, used to build the "Full Changelog" compare link.
    required: true

outputs:
  notes-file:
    description: Path to the generated release notes file.
    value: ${{ steps.summarize.outputs.notes-file }}
  previous-tag:
    description: The previous release tag the changes were computed against.
    value: ${{ steps.range.outputs.previous-tag }}

runs:
  using: composite
  steps:
    - name: Collect changes since the previous release
      id: range
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        REF: ${{ inputs.ref }}
      run: |
        set -euo pipefail
        # Make sure tags are present for the range computation (the checkout may
        # have been reset to a branch tip after a version-bump merge).
        git fetch --tags --force --quiet origin || true
        # Previous release = highest version tag that isn't the one being
        # released now. Version sort keeps this correct regardless of tag dates.
        PREV=$(git tag --sort=-v:refname | grep -v -x "v${VERSION}" | head -n1 || true)
        if [ -n "$PREV" ]; then
          RANGE="${PREV}..${REF}"
        else
          RANGE="$REF"   # first release: include the whole history
        fi
        echo "previous-tag=${PREV}" >> "$GITHUB_OUTPUT"
        # One bullet per non-merge commit subject, excluding the release bump
        # commits this pipeline creates ("Release vX.Y.Z").
        git log --no-merges --pretty='- %s' $RANGE 2>/dev/null \
          | grep -v -E '^- Release v[0-9]' > changes.txt || true
        # Keep the prompt bounded if a release spans an unusually large range.
        if [ "$(wc -l < changes.txt)" -gt 300 ]; then
          head -n 300 changes.txt > changes.trimmed && mv changes.trimmed changes.txt
        fi
        echo "Previous release: ${PREV:-<none>} | range: ${RANGE}"
        cat changes.txt

    - name: Summarize changes with OpenAI
      id: summarize
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENAI_MODEL: ${{ inputs.model }}
        VERSION: ${{ inputs.version }}
        REPO: ${{ inputs.repository }}
        PREV: ${{ steps.range.outputs.previous-tag }}
      run: |
        set -euo pipefail
        # On any OpenAI unavailability, fail the release with a clear reason —
        # both as an inline ::error:: annotation and in the run summary panel.
        fail() {
          echo "::error title=AI release notes unavailable::$1"
          {
            echo "## ❌ Release notes generation failed"
            echo
            echo "$1"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
        }

        if [ -z "${OPENAI_API_KEY:-}" ]; then
          fail "The OPENAI_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions (repo or org), then re-run."
        fi
        if [ ! -s changes.txt ]; then
          # No commits in range — a legitimately empty release, not an API
          # failure. Emit a minimal note instead of calling the API.
          printf '_No notable changes since %s._\n' "${PREV:-the previous release}" > release_notes.md
          echo "notes-file=release_notes.md" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        SYSTEM='You write concise GitHub release notes. You are given a list of commit subjects representing every change since the previous release. Output GitHub-flavored Markdown only, with no preamble or headings: one short summary sentence, then a bullet list of the KEY user-facing changes since the last release. Merge duplicates and closely related commits, and drop pure noise (merge commits, version bumps, formatting-only, CI-only, and internal refactors with no user impact). Order bullets by importance and keep it tight — aim for the 5-12 most important changes.'
        # Build the request with jq so commit text is safely JSON-encoded; a
        # crafted commit message cannot break out of the JSON or inject fields.
        jq -n \
          --arg model "$OPENAI_MODEL" \
          --arg system "$SYSTEM" \
          --rawfile commits changes.txt \
          '{model: $model, temperature: 0.3, max_tokens: 900,
            messages: [
              {role: "system", content: $system},
              {role: "user", content: ("Summarize the key changes since the previous release from these commits:\n\n" + $commits)}
            ]}' > payload.json

        HTTP=$(curl -sS -o resp.json -w '%{http_code}' \
          https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${OPENAI_API_KEY}" \
          -H "Content-Type: application/json" \
          -d @payload.json) \
          || fail "Could not reach the OpenAI API (network error). Check connectivity and that api.openai.com is reachable from the runner."

        if [ "${HTTP:-}" != "200" ]; then
          MSG=$(jq -r '.error.message // empty' resp.json 2>/dev/null || true)
          fail "OpenAI API returned HTTP ${HTTP:-unknown}.${MSG:+ Message: ${MSG}} (Common causes: invalid/expired key, no billing/credits, rate limit, or unknown model '"${OPENAI_MODEL}"'.)"
        fi

        CONTENT=$(jq -r '.choices[0].message.content // empty' resp.json)
        if [ -z "$CONTENT" ]; then
          fail "OpenAI API returned a 200 response with an empty completion; no release notes were produced."
        fi

        printf '%s\n' "$CONTENT" > release_notes.md
        if [ -n "${PREV:-}" ]; then
          {
            echo
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV}...v${VERSION}"
          } >> release_notes.md
        fi
        echo "notes-file=release_notes.md" >> "$GITHUB_OUTPUT"
        echo "----- AI release notes -----"
        cat release_notes.md
